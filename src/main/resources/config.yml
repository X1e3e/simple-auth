  welcome-register: "&aДобро пожаловать на SkyLand! &fЗарегистрируйтесь: &e/register <пароль> <повтор_пароль>"
  welcome-login: "&aДобро пожаловать на SkyLand! &fВведите пароль: &e/login <пароль>"
  register-success: "&aВы успешно зарегистрировались и вошли!"
  login-success: "&aВы успешно вошли!"
  auto-login-success: "&aАвтоматический вход по IP. Добро пожаловать на SkyLand!"
  premium-login-success: "&aОбнаружена лицензия! Автоматический вход. Добро пожаловать на SkyLand!"
  wrong-password: "&cНеверный пароль! Осталось попыток: %d"
  passwords-dont-match: "&cПароли не совпадают!"
  password-too-short: "&cПароль слишком короткий! Минимальная длина: %d символов"
  already-registered: "&cВы уже зарегистрированы! Используйте /login <пароль>"
  already-logged-in: "&cВы уже вошли в систему!"
  not-registered: "&cВы не зарегистрированы! Используйте /register <пароль> <повтор_пароль>"
  must-login: "&cВам необходимо войти в систему!"
  kick-timeout: "&cВремя на авторизацию истекло!"
