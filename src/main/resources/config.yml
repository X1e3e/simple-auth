# SLlogin Configuration

# Настройки базы данных
database:
  # Выберите тип: "sqlite" или "mysql"
  type: "sqlite"
  sqlite:
    file: "database.db"
  mysql:
    host: "localhost"
    port: 3306
    database: "sllogin"
    username: "root"
    password: ""
    useSSL: false

# Настройки паролей
password:
  # Алгоритм хеширования: SHA256, PLAIN_SHA256, или DOUBLE_SHA256
  # - SHA256: SHA-256 с солью (Рекомендуется)
  # - PLAIN_SHA256: Обычный SHA-256 без соли (для простых интеграций)
  # - DOUBLE_SHA256: sha256(sha256(password)) (для совместимости с AuthMe)
  algorithm: "SHA256"
  
  # Минимальная длина пароля
  min-length: 6

# Авторизация по IP (сессии)
ip-autologin:
  enabled: true
  # Время действия сессии в часах. В течение этого времени игроку не нужно будет вводить пароль при входе с того же IP.
  session-hours: 72

# Настройки безопасности для неавторизованных игроков
security:
  # Время в секундах на авторизацию до кика
  timeout-seconds: 60
  # Максимальное количество попыток ввода пароля до кика
  max-attempts: 3
  # Накладывать ли эффект слепоты на игрока при входе
  apply-blindness: true
  # Автоматический вход для игроков с лицензией (проверяется UUID)
  # Требует online-mode: true на сервере ИЛИ включенный online-mode на BungeeCord/Velocity прокси с форвардингом UUID.
  premium-auto-login: true

# Встроенный HTTP API для интеграции с сайтом (например, для смены пароля на skylands.online)
api:
  enabled: false
  port: 8080
  # Секретный ключ для авторизации запросов. ОБЯЗАТЕЛЬНО ИЗМЕНИТЕ ЕГО!
  key: "change-me-to-a-very-secure-secret-key"

# Сообщения (поддерживают цветовые коды &)
